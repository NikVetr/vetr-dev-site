<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consortia | Montgomery Lab OS</title>
    <meta name="description" content="Consortia, collaborative programs, and platform-scale partnerships connected to the Montgomery Lab.">
    <link rel="icon" type="image/png" href="assets/brand/favicon.png">
    <link rel="preload" href="assets/fonts/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="style.css">
  </head>
  <body data-page="consortia">
    <a class="skip-link" href="#contentMount">Skip to content</a>
    <div class="scene-grid" aria-hidden="true"></div>
    <div class="scene-glow" aria-hidden="true"></div>
    <div class="scene-noise" aria-hidden="true"></div>
    <div id="codeField" class="code-field" aria-hidden="true"></div>
    <div id="helixField" class="helix-field" aria-hidden="true"></div>
    <aside class="command-dock">
      <div class="dock-brand"><div class="brand-mark">ML</div><div class="brand-copy"><strong class="brand-primary">Montgomery Lab</strong><small class="brand-secondary">stanford medicine</small></div></div>
      <nav id="dockNav" class="dock-nav" aria-label="Primary"></nav>
      <div class="dock-status"><p class="terminal-label">Mode</p><strong>Partner network</strong><p>platform-scale collaboration</p></div>
    </aside>
    <div class="site-shell">
      <main class="page-stage">
        <section id="pageHero"></section>
        <section id="contentMount"></section>
      </main>
      <aside id="floatingTerminal" class="floating-terminal" aria-label="Lab terminal"></aside>
      <footer id="footerMount"></footer>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
